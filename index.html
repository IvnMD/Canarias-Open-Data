<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Datos Abiertos Canarias</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}


header {
  background: #003a8f;
  color: white;
  padding: 1.5rem;
  text-align: center;
}

header h1 {
  margin: 0;
}


.search {
  max-width: 1100px;
  margin: auto;
  padding: 1rem;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 0.5rem;
}

.search input, .search select {
  padding: 0.7rem;
  font-size: 1rem;
}

/* RESULTS */
main {
  max-width: 1100px;
  margin: auto;
  padding: 1rem;
}

#results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}


.card {
  background: white;
  padding: 1rem;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card h3 {
  margin-top: 0;
  color: #003a8f;
}

.badge {
  display: inline-block;
  padding: 0.2rem 0.5rem;
  background: #e6ecf5;
  color: #003a8f;
  font-size: 0.8rem;
  border-radius: 4px;
  margin: 2px;
}

a {
  color: #003a8f;
  font-weight: bold;
  text-decoration: none;
}


footer {
  background: #eee;
  text-align: center;
  padding: 1rem;
  margin-top: 2rem;
}


@media (max-width: 768px) {
  .search {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>Portal de Datos Abiertos de Canarias</h1>
  <p>Buscador unificado de instituciones y datasets</p>
</header>


<div class="search">
  <input id="searchText" placeholder="Buscar (ej: turismo, ISTAC, OSM...)">

  <select id="filterType">
    <option value="">Todos los tipos</option>
    <option value="gobierno_autonomico">Gobierno</option>
    <option value="organismo_especializado">Organismo</option>
    <option value="organismo_especializado_geoespacial">Geoespacial</option>
    <option value="cabildo">Cabildo</option>
    <option value="ayuntamiento">Ayuntamiento</option>
  </select>

  <select id="filterIsland">
    <option value="">Todas las islas</option>
    <option value="canarias">Canarias</option>
    <option value="Tenerife">Tenerife</option>
    <option value="Gran Canaria">Gran Canaria</option>
  </select>
</div>

<main>
  <div id="results"></div>
</main>

<footer>
  © 2026 · Datos Abiertos Canarias · Demo educativa
</footer>

<script>
let data = [];


fetch("entidades.json")
  .then(r => r.json())
  .then(json => {
    data = json.flat(); 
    render(data);
  });


document.getElementById("searchText").addEventListener("input", filter);
document.getElementById("filterType").addEventListener("change", filter);
document.getElementById("filterIsland").addEventListener("change", filter);


function filter() {
  const text = document.getElementById("searchText").value.toLowerCase();
  const type = document.getElementById("filterType").value;
  const island = document.getElementById("filterIsland").value;

  const filtered = data.filter(e => {

    const matchText =
      (e.name || "").toLowerCase().includes(text) ||
      (e.description || "").toLowerCase().includes(text) ||
      (e.data_categories || []).join(" ").toLowerCase().includes(text);

    const matchType = !type || e.type === type;

    const matchIsland =
      !island ||
      e.island?.includes(island) ||
      e.islands?.includes(island) ||
      e.island === "canarias";

    return matchText && matchType && matchIsland;
  });

  render(filtered);
}


function render(list) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  list.forEach(e => {

    const categories = (e.data_categories || []).slice(0, 5);
    const formats = (e.formats || []).slice(0, 5);

    container.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>

        <p><strong>Tipo:</strong> ${e.type}</p>
        <p><strong>Portal:</strong> 
          <a href="${e.portal_url}" target="_blank">Abrir</a>
        </p>

        <p><strong>Dataset:</strong> ${e.dataset_count || "N/D"}</p>

        <p><strong>Categorías:</strong><br>
          ${categories.map(c => `<span class="badge">${c}</span>`).join("")}
        </p>

        <p><strong>Formatos:</strong><br>
          ${formats.map(f => `<span class="badge">${f}</span>`).join("")}
        </p>

        ${
          e.coordinates
            ? `<p>📍 ${e.coordinates.lat}, ${e.coordinates.lon}</p>`
            : ""
        }
      </div>
    `;
  });
}
</script>

</body>
</html>

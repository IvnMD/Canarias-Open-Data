name: Validar schema JSON

on:
  pull_request:
    paths:
      - "src/static/data/entidades.json"
      - "src/static/data/entidades.schema.json"

jobs:
  validate:
    name: Validar entidades.json contra schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install jsonschema

      - name: Ejecutar validación
        run: python src/static/utils/validadorJson.py

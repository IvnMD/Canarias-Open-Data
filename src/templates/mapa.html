<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Datos Abiertos Canarias</title>

  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='assets/logo.svg') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/light-mode.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mapa.css') }}">
</head>

<body>

  <header>
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <h1>🗺️ Mapa de Datos Abiertos Canarias</h1>
        <p>Instituciones y organismos con portales de datos abiertos</p>
      </div>
      <button id="menuToggleBtn" class="menu-toggle-btn">☰</button>
    </div>
  </header>

  <nav class="main-nav collapsed" id="mainNav">
    <div class="nav-container">
      <a href="/" class="nav-link">
        <span class="nav-icon">🔍</span>
        <span>Buscador</span>
      </a>
      <a href="{{ url_for('estadisticas') }}" class="nav-link">
        <span class="nav-icon">📊</span>
        <span>Estadísticas</span>
      </a>
      <a href="{{ url_for('mapa') }}" class="nav-link active">
        <span class="nav-icon">🗺️</span>
        <span>Mapa</span>
      </a>
    </div>
  </nav>
  
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Ajusta el top del nav y del mapa según la altura real del header
    function adjustLayout() {
      const headerH = document.querySelector('header').offsetHeight;
      const nav = document.getElementById('mainNav');
      const mapEl = document.getElementById('map');

      nav.style.top = headerH + 'px';

      const navH = menuOpen ? nav.offsetHeight : 0;
      mapEl.style.top = (headerH + navH) + 'px';

      if (window._map) window._map.invalidateSize();
    }

    // Menú colapsable
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const mainNav = document.getElementById('mainNav');
    let menuOpen = false;

    menuToggleBtn.addEventListener('click', function() {
      menuOpen = !menuOpen;
      if (menuOpen) {
        mainNav.classList.remove('collapsed');
        mainNav.classList.add('expanded');
        menuToggleBtn.textContent = '✕';
      } else {
        mainNav.classList.remove('expanded');
        mainNav.classList.add('collapsed');
        menuToggleBtn.textContent = '☰';
      }
      setTimeout(function() { adjustLayout(); }, 350);
    });

    window.addEventListener('resize', adjustLayout);

    // Mapa
    const map = window._map = L.map('map', {
      minZoom: 3,
      maxBounds: [[-90, -180], [90, 180]],
      maxBoundsViscosity: 1.0
    }).setView([28.4, -15.8], 7);

    L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      {
        attribution: '&copy; OpenStreetMap &amp; CartoDB',
        noWrap: true,
        bounds: [[-90, -180], [90, 180]]
      }
    ).addTo(map);

    function getColor(entity_kind) {
      switch (entity_kind) {
        case 'gobierno_autonomico': return '#ef4444';
        case 'cabildo':            return '#22c55e';
        case 'ayuntamiento':       return '#3b82f6';
        case 'organismo':          return '#f59e0b';
        case 'empresa_publica':    return '#a855f7';
        default:                   return '#64748b';
      }
    }

    function getTypeName(entity_kind) {
      const names = {
        'gobierno_autonomico': 'Gobierno Autonómico',
        'cabildo':             'Cabildo',
        'ayuntamiento':        'Ayuntamiento',
        'organismo':           'Organismo',
        'empresa_publica':     'Empresa Pública'
      };
      return names[entity_kind] || entity_kind;
    }

    fetch('/api/entidades')
      .then(response => response.json())
      .then(data => {
        data.forEach(entidad => {
          // Las coordenadas están en locations[0].coordinates (schema v2)
          const loc = (entidad.locations || []).find(l => l.coordinates);
          if (!loc) return;

          const { lat, lon } = loc.coordinates;

          // Dataset count viene del primer portal
          const portal = (entidad.portals || [])[0];
          const datasetCount = portal ? (portal.dataset_count || 0) : 0;

          L.circleMarker([lat, lon], {
            radius: 8,
            fillColor: getColor(entidad.entity_kind),
            color: '#ffffff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
          })
            .addTo(map)
            .bindPopup(`
              <div style="min-width:220px">
                <h2 style="margin-bottom:0.5rem; font-size:1rem;">
                  ${entidad.name}
                </h2>
                <p><strong>Tipo:</strong> ${getTypeName(entidad.entity_kind)}</p>
                <p><strong>Datasets:</strong> ${datasetCount}</p>
              </div>
            `);
        });
      })
      .catch(error => console.error('Error cargando entidades:', error));

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h3>Leyenda</h3>
        <div class="legend-item"><span class="color-dot" style="background:#ef4444"></span>Gobierno autonómico</div>
        <div class="legend-item"><span class="color-dot" style="background:#22c55e"></span>Cabildos</div>
        <div class="legend-item"><span class="color-dot" style="background:#3b82f6"></span>Ayuntamientos</div>
        <div class="legend-item"><span class="color-dot" style="background:#f59e0b"></span>Organismos</div>
        <div class="legend-item"><span class="color-dot" style="background:#a855f7"></span>Empresas públicas</div>
      `;
      return div;
    };
    legend.addTo(map);

    // Ajustar layout inicial una vez el DOM está pintado
    requestAnimationFrame(function() {
      adjustLayout();
    });

    // Modo oscuro (persistencia)
    (function () {
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>

</body>

</html>
